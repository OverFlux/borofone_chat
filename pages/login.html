<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borofone Chat - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1e1f22;
            --bg-secondary: #2b2d31;
            --bg-tertiary: #313338;
            --text-primary: #f2f3f5;
            --text-secondary: #b5bac1;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --border: #3f4147;
            --error: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .error {
            color: var(--error);
            font-size: 13px;
            margin-top: 12px;
            min-height: 18px;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }

        .footer a {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome back</h1>
        <p>Sign in to continue to Borofone Chat.</p>
        <form id="loginForm">
            <label for="email">Email</label>
            <input id="email" type="email" required />

            <label for="password">Password</label>
            <input id="password" type="password" required />

            <button type="submit">Log in</button>
            <div class="error" id="errorText"></div>
        </form>
        <div class="footer">
            No account? <a href="./register.html">Register here</a>
        </div>
    </div>

    <script>
        function resolveApiBase() {
            const stored = localStorage.getItem('api_base');
            if (stored) return stored.replace(/\/$/, '');

            const url = new URL(window.location.href);

            if (url.protocol === 'file:') {
                return 'http://localhost:8000';
            }

            if (url.port && url.port !== '8000') {
                return `${url.protocol}//${url.hostname}:8000`;
            }

            return url.origin;
        }

        const API_URL = resolveApiBase();

        const loginForm = document.getElementById('loginForm');
        const errorText = document.getElementById('errorText');

        function storeTokens(data) {
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('refresh_token', data.refresh_token);
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorText.textContent = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorText.textContent = data.detail || 'Login failed';
                    return;
                }

                storeTokens(data);
                window.location.href = './main.html';
            } catch (err) {
                errorText.textContent = 'Network error. Try again later.';
            }
        });
    </script>
</body>
</html>
